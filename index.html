<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexDraw - Inteligência em Drawback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --azul-marinho: #001B4F;
            --azul-secundario: #0A2D6F;
            --dourado-principal: #D4A03A;
            --branco: #FFFFFF;
            --cinza-claro: #F4F4F4;
            --cinza-linha: #E8E8E8;
            --cinza-texto: #666666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--cinza-texto);
            line-height: 1.7;
            background-color: var(--branco);
        }

        /* Header */
        header {
            background-color: var(--branco);
            padding: 1.8rem 2rem;
            border-bottom: 1px solid var(--cinza-linha);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-img {
            height: 100px;
            width: auto;
            object-fit: contain;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--cinza-texto);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--dourado-principal);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a:hover {
            color: var(--azul-marinho);
        }

        /* Hero */
        .hero {
            background: linear-gradient(180deg, var(--branco) 0%, var(--cinza-claro) 100%);
            padding: 5.5rem 2rem;
            text-align: center;
        }

        .hero-content {
            max-width: 900px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3.2rem;
            color: var(--azul-marinho);
            margin-bottom: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.3px;
        }

        .hero p {
            font-size: 1.15rem;
            color: var(--cinza-texto);
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .highlight {
            color: var(--dourado-principal);
            font-weight: 600;
        }

        .cta-btn {
            background-color: var(--azul-marinho);
            color: var(--branco);
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
            letter-spacing: 0.3px;
        }

        .cta-btn:hover {
            background-color: var(--dourado-principal);
            color: var(--azul-marinho);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(212, 160, 58, 0.25);
        }

        .cta-secondary {
            background-color: var(--branco);
            color: var(--azul-marinho);
            border: 1.5px solid var(--azul-marinho);
        }

        .cta-secondary:hover {
            background-color: var(--azul-marinho);
            color: var(--branco);
            border-color: var(--azul-marinho);
        }

        /* Linha divisória */
        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cinza-linha), transparent);
            margin: 3rem 0;
        }

        /* Diagnóstico */
        .diagnostico {
            background-color: var(--cinza-claro);
            padding: 5rem 2rem;
            text-align: center;
        }

        .diagnostico-content {
            max-width: 700px;
            margin: 0 auto;
        }

        .badge {
            display: inline-block;
            background-color: var(--dourado-principal);
            color: var(--azul-marinho);
            padding: 0.6rem 1.3rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .diagnostico h2 {
            font-size: 2.4rem;
            color: var(--azul-marinho);
            margin-bottom: 1rem;
            font-weight: 700;
        }
